name: Daily Content Generator

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate daily article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "KrediGuide Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Daily article: $(date '+%Y-%m-%d')"
          git push
